<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <link rel="stylesheet" href="/assets/fonts.css">
    <link rel="stylesheet" href="app.css">
    <link rel="prefetch" href="frontend.wasm" as="fetch" type="application/wasm" crossorigin="anonymous">
    <script src="auth.js"></script>
    <script src="token.js"></script>
    <script>
        (function () {
            const warmWasm = function () {
                fetch("frontend.wasm", {
                    credentials: "same-origin",
                    cache: "force-cache",
                }).catch(function () {
                    // Ignore speculative warmup failures on the login page.
                });
            };

            if ("requestIdleCallback" in window) {
                window.requestIdleCallback(warmWasm);
            } else {
                window.setTimeout(warmWasm, 250);
            }
        })();
    </script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="google-auth.js" defer></script>
    <script src="login-providers.js" defer></script>
    <script src="login.js" defer></script>
</head>

<body class="login-page">
    <main>
        <header>
            <h1>Hello</h1>
        </header>
        <section id="providers"></section>
    </main>
</body>

</html>
