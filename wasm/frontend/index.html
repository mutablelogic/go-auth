<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <link rel="stylesheet" href="dist/bundle.css">
    <link rel="stylesheet" href="css/app.css">
    <script type="module" src="dist/bundle.js"></script>
    <link rel="prefetch" href="frontend.wasm" as="fetch" type="application/wasm" crossorigin="anonymous">
    <script src="js/auth.js"></script>
    <script src="js/token.js"></script>
    <script>
        (function () {
            const warmWasm = function () {
                fetch("frontend.wasm", {
                    credentials: "same-origin",
                    cache: "force-cache",
                }).then(function (response) {
                    if (!response.ok) {
                        throw new Error(response.status + " " + response.statusText);
                    }

                    document.body.classList.add("wasm-warmed");
                }).catch(function () {
                    // Ignore speculative warmup failures on the login page.
                });
            };

            if ("requestIdleCallback" in window) {
                window.requestIdleCallback(warmWasm);
            } else {
                window.setTimeout(warmWasm, 250);
            }
        })();
    </script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="js/google-auth.js" defer></script>
    <script src="js/login-providers.js" defer></script>
    <script src="js/login.js" defer></script>
</head>

<body class="login-page cds--g100">
    <main>
        <header>
            <h1>Hello</h1>
        </header>
        <section id="providers"></section>
    </main>
</body>

</html>
