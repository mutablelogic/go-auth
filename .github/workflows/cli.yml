name: Build CLI Clients

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build CLI Clients
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - os: ubuntu-24.04
            goos: linux
            goarch: amd64
          - os: windows-latest
            goos: windows
            goarch: amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name ||
            github.ref_name }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Compute build metadata
        shell: bash
        run: |
          echo "VERSION=$(git describe --tags --always | sed 's/^v//')" >> "$GITHUB_ENV"
          echo "GIT_BRANCH=$(git name-rev HEAD --name-only --always)" >> "$GITHUB_ENV"

      - name: Build Client (Unix)
        if: matrix.goos != 'windows'
        env:
          OS: ${{ matrix.goos }}
          ARCH: ${{ matrix.goarch }}
        shell: bash
        run: make client

      - name: Build Client (Windows)
        if: matrix.goos == 'windows'
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        shell: bash
        run: |
          go build \
            -tags client \
            -ldflags "-s -w -X github.com/mutablelogic/go-server/pkg/version.GitTag=${VERSION} -X github.com/mutablelogic/go-server/pkg/version.GitBranch=${GIT_BRANCH}" \
            -o build/authmanager \
            ./cmd/authmanager

      - name: Rename binary for release
        shell: bash
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            mv build/authmanager build/authmanager-${{ matrix.goos }}-${{ matrix.goarch }}.exe
          else
            mv build/authmanager build/authmanager-${{ matrix.goos }}-${{ matrix.goarch }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: authmanager-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/authmanager-${{ matrix.goos }}-${{ matrix.goarch }}*

  release:
    name: Attach CLI Assets
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Attach assets to published release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: ./artifacts/**/*
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
