<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <link rel="stylesheet" href="css/login.css">
</head>

<body class="login-page">
    <main>
        <section class="login-hero" aria-hidden="true"></section>
        <aside class="login-strip">
            <section class="login-panel">
                <header>
                    <h1>Hello</h1>
                </header>
                <section class="providers-card">
                    <h2 id="provider-heading" hidden></h2>
                    <div class="provider-actions">
                        <button id="login-local" class="provider-button provider-button-local" type="button" disabled
                            hidden>
                            <span class="provider-button-icon provider-button-icon-local" aria-hidden="true">
                                <svg viewBox="0 0 24 24" role="presentation">
                                    <circle cx="12" cy="8" r="4.5" fill="currentColor"></circle>
                                    <path d="M4.5 21c.8-4.23 3.3-6.35 7.5-6.35S18.7 16.77 19.5 21" fill="none"
                                        stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                                </svg>
                            </span>
                            <span class="provider-button-label">Local login</span>
                        </button>
                        <button id="login-google" class="provider-button provider-button-google" type="button" disabled
                            hidden>
                            <span class="provider-button-icon provider-button-icon-google" aria-hidden="true">
                                <svg viewBox="0 0 24 24" role="presentation">
                                    <path fill="#4285F4"
                                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z">
                                    </path>
                                    <path fill="#34A853"
                                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z">
                                    </path>
                                    <path fill="#FBBC05"
                                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z">
                                    </path>
                                    <path fill="#EA4335"
                                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z">
                                    </path>
                                </svg>
                            </span>
                            <span class="provider-button-label">Google login</span>
                        </button>
                        <button id="refresh-session" class="provider-button provider-button-refresh" type="button"
                            hidden>Refresh</button>
                        <button id="revoke-session" class="provider-button provider-button-revoke" type="button"
                            hidden>Revoke</button>
                    </div>
                    <p id="provider-status" class="provider-status" aria-live="polite">Loading providers...</p>
                    <pre id="auth-status" aria-live="polite">Waiting for login.</pre>
                </section>
            </section>
        </aside>
    </main>
    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
</body>

</html>
