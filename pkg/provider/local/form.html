<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{.Title}}</title>
    <style>
        :root {
            color-scheme: light;
        }

        body {
            font-family: Georgia, serif;
            background: #f4efe7;
            color: #1f1b18;
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
        }

        main {
            width: min(28rem, calc(100vw - 2rem));
            background: #fffaf3;
            border: 1px solid #d7c7b2;
            border-radius: 18px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(68, 49, 24, 0.12);
        }

        h1 {
            margin: 0 0 0.5rem;
            font-size: 1.8rem;
        }

        p {
            margin: 0 0 1rem;
            line-height: 1.5;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        input[type="email"] {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #bca892;
            border-radius: 10px;
            padding: 0.8rem 0.9rem;
            font: inherit;
            background: #fff;
        }

        button {
            margin-top: 1rem;
            width: 100%;
            border: 0;
            border-radius: 999px;
            padding: 0.9rem 1rem;
            font: inherit;
            font-weight: 600;
            color: #fff;
            background: #7b4b2a;
            cursor: pointer;
        }

        .error {
            background: #f8d7da;
            color: #842029;
            border-radius: 10px;
            padding: 0.75rem 0.9rem;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>
    <main>
        <h1>{{.Title}}</h1>
        <p>Enter an email address to continue with the local identity provider.</p>
        {{if .Error}}<div class="error">{{.Error}}</div>{{end}}
        <form method="post" action="{{.Action}}">
            <input type="hidden" name="provider" value="{{.Provider}}">
            <input type="hidden" name="redirect_uri" value="{{.RedirectURL}}">
            <input type="hidden" name="state" value="{{.State}}">
            <input type="hidden" name="nonce" value="{{.Nonce}}">
            <input type="hidden" name="code_challenge" value="{{.CodeChallenge}}">
            <input type="hidden" name="code_challenge_method" value="{{.CodeChallengeMethod}}">
            <input type="hidden" name="scope" value="{{.Scope}}">
            <label for="login_hint">Email</label>
            <input id="login_hint" name="login_hint" type="email" autocomplete="email" value="{{.LoginHint}}"
                placeholder="local@example.com" required>
            <button type="submit">Continue</button>
        </form>
    </main>
</body>

</html>
